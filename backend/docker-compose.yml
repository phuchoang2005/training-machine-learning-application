# Standalone backend stack — run the API + MongoDB in isolation for backend development.
#   docker compose up -d --build
# The API is published on :8080 (context path /api/v1, health at /api/v1/health).
#
# The backend spawns *sibling* training containers through the host Docker daemon and
# bind-mounts each job workspace by absolute path. For that path to resolve identically
# inside this container and on the host daemon, the storage directory is mounted at the
# SAME absolute path on both sides (${PWD}/storage). Keep that invariant if you change it.
services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb:27017/ai_training
      APP_STORAGE_ROOT: ${PWD}/storage
      APP_DOCKER_WORKSPACE_ROOT: ${PWD}/storage/workspaces
      APP_DOCKER_SOURCES_ROOT: ${PWD}/storage/sources
      APP_DOCKER_IMAGE: ${APP_DOCKER_IMAGE:-python:3.11-slim}
      APP_QUEUE_RUNNING_LIMIT: ${APP_QUEUE_RUNNING_LIMIT:-2}
      APP_NOTIFICATION_ENABLED: ${APP_NOTIFICATION_ENABLED:-false}
    ports:
      - "8080:8080"
    volumes:
      # Same host:container path so `docker run -v <workspace>` resolves on the host daemon.
      - ${PWD}/storage:${PWD}/storage
      # Lets the backend drive the host Docker daemon to run training containers.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mongo-data:

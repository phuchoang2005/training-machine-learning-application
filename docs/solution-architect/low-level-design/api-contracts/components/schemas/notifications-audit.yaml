AuditLog:
  type: object
  required: [auditId, action, resourceType, resourceId, createdAt]
  properties:
    auditId:
      type: string
      format: uuid
    actor:
      $ref: "./jobs.yaml#/TriggeredBy"
    projectId:
      type: [string, "null"]
      format: uuid
    jobId:
      type: [string, "null"]
      format: uuid
    action:
      type: string
    resourceType:
      type: string
    resourceId:
      type: string
    metadata:
      type: object
      additionalProperties: true
    createdAt:
      type: string
      format: date-time
AuditLogPage:
  type: object
  required: [data, page]
  properties:
    data:
      type: array
      items:
        $ref: "#/AuditLog"
    page:
      $ref: "./common.yaml#/Page"

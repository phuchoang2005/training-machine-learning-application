UserRole:
  type: string
  enum: [USER, ADMIN]
UserStatus:
  type: string
  enum: [ACTIVE, DISABLED]
SourceType:
  type: string
  enum: [GITHUB, ZIP]
BuildStatus:
  type: string
  description: >-
    State of a project's per-project Docker image build. The image is built off the request thread
    at registration, so a project is BUILDING until it finalizes; jobs may only be started once it is
    READY. FAILED projects keep their record so the build log can be inspected.
  enum: [BUILDING, READY, FAILED]
JobStatus:
  type: string
  enum: [CREATED, QUEUED, RUNNING, SUCCESS, FAILED, CANCELLED, RETRYING]
StreamType:
  type: string
  enum: [STDOUT, STDERR]
ArtifactType:
  type: string
  enum: [MODEL, CHECKPOINT, METRIC, OTHER]
Page:
  type: object
  required: [limit, hasMore]
  properties:
    limit:
      type: integer
    nextCursor:
      type: [string, "null"]
    hasMore:
      type: boolean
ErrorResponse:
  type: object
  required: [error]
  properties:
    error:
      type: object
      required: [code, message, correlationId]
      properties:
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              reason:
                type: string

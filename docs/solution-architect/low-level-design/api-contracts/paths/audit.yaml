auditLogs:
  get:
    tags: [Audit]
    summary: Search audit logs
    operationId: searchAuditLogs
    parameters:
      - $ref: "../components/parameters.yaml#/Limit"
      - $ref: "../components/parameters.yaml#/Cursor"
      - name: action
        in: query
        schema:
          type: string
      - name: projectId
        in: query
        schema:
          type: string
          format: uuid
      - name: jobId
        in: query
        schema:
          type: string
          format: uuid
    responses:
      "200":
        description: Audit log page
        content:
          application/json:
            schema:
              $ref: "../components/schemas/notifications-audit.yaml#/AuditLogPage"

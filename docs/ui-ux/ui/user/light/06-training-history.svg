<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">

        <defs>
            <radialGradient id="bg-glow" cx="85%" cy="15%" r="65%">
                <stop offset="0%" stop-color="#dbeafe" stop-opacity="1"/>
                <stop offset="100%" stop-color="#f8fbff" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="bg-glow2" cx="15%" cy="85%" r="65%">
                <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#f8fbff" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="bg-glow3" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#eef2ff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#f8fbff" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="light-aurora" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
                <stop offset="45%" stop-color="#60a5fa" stop-opacity="0.28"/>
                <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.32"/>
            </linearGradient>
            <linearGradient id="light-aurora-2" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.36"/>
                <stop offset="55%" stop-color="#93c5fd" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.2"/>
            </linearGradient>
            <radialGradient id="light-heart-glow" cx="50%" cy="42%" r="52%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
                <stop offset="42%" stop-color="#bae6fd" stop-opacity="0.38"/>
                <stop offset="100%" stop-color="#f8fbff" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0ea5e9"/>
                <stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
            
            <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#1e3a8a"/>
                <stop offset="100%" stop-color="#0f766e"/>
            </linearGradient>
            
            <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.96)"/>
                <stop offset="100%" stop-color="rgba(255, 255, 255, 0.9)"/>
            </linearGradient>
            
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#93c5fd" flood-opacity="0.15"/>
            </filter>
            <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#93c5fd" flood-opacity="0.1"/>
            </filter>
            
            <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2563eb" flood-opacity="0.4"/>
            </filter>
            <filter id="glow-success" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#34d399" flood-opacity="0.4"/>
            </filter>
            
            <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="16"/>
            </filter>
        </defs>
        <style><![CDATA[

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .bg-base { fill: #f8fbff; }
        .card { fill: rgba(255, 255, 255, 0.9); stroke: rgba(191, 219, 254, 0.9); stroke-width: 1; backdrop-filter: blur(12px); }
        .card:hover { stroke: rgba(56, 189, 248, 0.55); transition: stroke 0.3s ease; }
        .glass { fill: url(#sidebar-grad); }
        
        .text-primary { fill: #0f172a; }
        .text-muted { fill: #475569; }
        .gradient-text { fill: url(#text-grad); }
        
        .pulse { animation: pulse 2.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .spin { animation: spin 2s linear infinite; transform-origin: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }
        
        .btn-primary { fill: url(#primary-grad); filter: url(#glow-primary); transition: filter 0.3s; cursor: pointer; }
        .btn-primary:hover { filter: brightness(1.1) url(#glow-primary); }
        .btn-primary-text { fill: #ffffff; }
        
        .btn-secondary { fill: #ffffff; stroke: #bfdbfe; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { fill: #eff6ff; stroke: #93c5fd; }
        .btn-secondary-text { fill: #334155; }
        
        .btn-danger { fill: #fee2e2; stroke: #f87171; }
        .btn-danger-text { fill: #b91c1c; }
        
]]></style>

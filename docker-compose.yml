# Full-stack local stack — MongoDB + backend API + frontend, all in one network.
#   docker compose up -d --build
# Build the frontend bundle on the host first (the frontend image serves frontend/dist/):
#   (cd frontend && npm ci && npm run build)
# Then open http://localhost/  (health: /healthz, API through the proxy: /api/v1/health).
#
# The backend runs as a container but drives the *host* Docker daemon to launch sibling
# training containers. The job storage directory is therefore mounted at the SAME absolute
# path inside the backend container and on the host (${PWD}/backend/storage) so that
# `docker run -v <workspace>` resolves correctly on the host daemon.
services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb:27017/ai_training
      APP_STORAGE_ROOT: ${PWD}/backend/storage
      APP_DOCKER_WORKSPACE_ROOT: ${PWD}/backend/storage/workspaces
      APP_DOCKER_SOURCES_ROOT: ${PWD}/backend/storage/sources
      APP_DOCKER_IMAGE: ${APP_DOCKER_IMAGE:-python:3.11-slim}
      APP_QUEUE_RUNNING_LIMIT: ${APP_QUEUE_RUNNING_LIMIT:-2}
      APP_NOTIFICATION_ENABLED: ${APP_NOTIFICATION_ENABLED:-false}
    ports:
      - "8080:8080"
    volumes:
      # Same host:container path so `docker run -v <workspace>` resolves on the host daemon.
      - ${PWD}/backend/storage:${PWD}/backend/storage
      # Lets the backend drive the host Docker daemon to run training containers.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      # In-network service name — no host.docker.internal needed when backend is a container.
      API_UPSTREAM: http://backend:8080
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  mongo-data:

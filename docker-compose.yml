services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ai_training
      POSTGRES_USER: ai_training
      POSTGRES_PASSWORD: ai_training
    volumes:
      - postgres-18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_training -d ai_training"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_training
      SPRING_DATASOURCE_USERNAME: ai_training
      SPRING_DATASOURCE_PASSWORD: ai_training
      APP_STORAGE_ROOT: /data
      APP_QUEUE_RUNNING_LIMIT: 2
    expose:
      - "8080"
    volumes:
      - ./backend/storage:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  load-balancer:
    build:
      context: .
      dockerfile: docker/load-balancer/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres-18-data:
